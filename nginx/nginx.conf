worker_processes  2;
error_log  /dev/stdout debug;
# /tmp is writable under any UID (e.g. OpenShift restricted SCC random UIDs)
pid        /tmp/nginx.pid;
env REDIS_HOST;
env TOKEN;
env K8S_TOKEN;
env NAMESPACE;
env KUBERNETES_SERVICE_HOST;
env KUBERNETES_SERVICE_PORT_HTTPS;
env PLATFORM_ENGINEERING_DEMO_MODE;
env APPLICATION_URL;
env DISABLE_TLS;

events {
    worker_connections  1024;
}

http {
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time '
                      'cs=$upstream_cache_status';

    access_log  /dev/stdout  main;
    error_log   /dev/stderr  debug;
    sendfile        on;
    keepalive_timeout  30;
    client_body_buffer_size 1000K;

    # Buffer/temp paths writable under any UID (OpenShift restricted SCC)
    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;
    include /etc/nginx/conf.d/*.conf;
}
