apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Basic Install
    categories: Developer Tools, Monitoring
    containerImage: docker.io/fumbles/kubeinvaders-operator:v0.1.4
    repository: https://github.com/lucky-sideburn/kubeinvaders
    support: KubeInvaders Community
  name: kubeinvaders-operator.v0.0.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: |-
        KubeInvaders deploys the KubeInvaders chaos engineering game and points it
        at a set of target namespaces, where pods become aliens you can shoot down.
      displayName: KubeInvaders
      kind: KubeInvaders
      name: kubeinvaders.game.kubeinvaders.io
      resources:
      - kind: Deployment
        name: ""
        version: v1
      - kind: Ingress
        name: ""
        version: v1
      - kind: Namespace
        name: ""
        version: v1
      - kind: Route
        name: ""
        version: v1
      - kind: Service
        name: ""
        version: v1
      - kind: ServiceAccount
        name: ""
        version: v1
      specDescriptors:
      - description: |-
          TargetNamespaces are the namespaces where KubeInvaders performs chaos
          experiments (i.e. where the aliens are pods you can shoot down).
        displayName: Target Namespaces
        path: targetNamespaces
      - description: Image is the KubeInvaders container image.
        displayName: Image
        path: image
      - description: Replicas is the number of KubeInvaders pods.
        displayName: Replicas
        path: replicas
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:podCount
      - description: |-
          Demo automatically creates the target namespaces and demo workloads to
          shoot at, so no manual setup is needed.
        displayName: Demo Workloads
        path: demo
      - description: |-
          Route configures an OpenShift Route for the web UI. The route host is
          exported to the game as APPLICATION_URL automatically.
        displayName: Route (OpenShift)
        path: route
      - description: |-
          ApplicationURL is the externally visible URL of the game, exported as the
          APPLICATION_URL environment variable. Defaults to the Ingress host when
          the Ingress is enabled.
        displayName: Application URL
        path: applicationURL
      - description: |-
          ExtraEnv are additional environment variables for the KubeInvaders
          container (e.g. ALIENPROXIMITY, HITSLIMIT, UPDATETIME, DISABLE_TLS).
        displayName: Extra Environment Variables
        path: extraEnv
      - description: |-
          Ingress configures the optional Ingress for the web UI (non-OpenShift
          clusters; on OpenShift prefer route).
        displayName: Ingress
        path: ingress
      - description: Resources are the compute resources for the KubeInvaders container.
        displayName: Resources
        path: resources
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:resourceRequirements
      - description: ServiceType is the type of the Service exposing the web UI.
        displayName: Service Type
        path: serviceType
      statusDescriptors:
      - description: Conditions represent the latest available observations of the
          state.
        displayName: Conditions
        path: conditions
        x-descriptors:
        - urn:alm:descriptor:io.kubernetes.conditions
      - description: ReadyReplicas is the number of ready KubeInvaders pods.
        displayName: Ready Replicas
        path: readyReplicas
      version: v1alpha1
  description: |
    KubeInvaders is a gamified chaos engineering and educational tool for Kubernetes,
    recommended by the CNCF. Inspired by the classic Space Invaders game, it lets you
    stress a Kubernetes cluster in a fun way: pods in the target namespaces appear as
    aliens, and shooting them deletes the pods so you can watch Kubernetes self-healing
    in action.

    ## What you will learn

    * **Pod lifecycle** - how pods are terminated and recreated by their controllers
    * **Self-healing** - how Deployments and ReplicaSets maintain the desired replica count
    * **Scheduling** - where Kubernetes places new pods after disruption and why
    * **Node pressure** - how the cluster reacts when a worker node is attacked
    * **Recovery time** - how long the cluster takes to return to a steady state

    ## Using the operator

    Create a `KubeInvaders` resource specifying the namespaces to target:

    ```yaml
    apiVersion: game.kubeinvaders.io/v1alpha1
    kind: KubeInvaders
    metadata:
      name: kubeinvaders
    spec:
      targetNamespaces:
        - namespace1
        - namespace2
    ```

    The operator deploys the game, exposes it through a Service (and optional Ingress),
    and grants the game's ServiceAccount the RBAC it needs for chaos experiments.
  displayName: KubeInvaders
  icon:
  - base64data: 
    mediatype: image/svg+xml
  install:
    spec:
      deployments: null
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - chaos-engineering
  - game
  - resilience
  - education
  - space-invaders
  links:
  - name: KubeInvaders on GitHub
    url: https://github.com/lucky-sideburn/kubeinvaders
  - name: Operator development fork
    url: https://github.com/fumbles/kubeinvaders
  maintainers:
  - email: danielr.riggins@gmail.com
    name: Daniel Riggins
  maturity: alpha
  minKubeVersion: 1.25.0
  provider:
    name: KubeInvaders Community
    url: https://github.com/lucky-sideburn/kubeinvaders
  replaces: kubeinvaders-operator.v0.1.3
  version: 0.0.0
